<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report.Farm · Field Report</title>
    <!-- No pre-paint role-gate here: the report surface is role-agnostic (any
         holder of farm:view across ANY surface may open a report they own). The
         GET /farm/reports/:id call enforces farm:view server-side (403 → "not
         found"), and api.ts redirects to /login on 401 — so auth is still
         enforced without a surface-keyed gate that would misroute e.g. growers. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = window.localStorage.getItem('rwr.surface-mode');
          var parsed = raw ? JSON.parse(raw) : null;
          var mode = parsed && parsed.state && parsed.state.mode === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-surface', mode);
        } catch (e) {
          document.documentElement.setAttribute('data-surface', 'light');
        }
      })();
    </script>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #F0F1F3; color: #0A0A0A; }
      :root[data-surface='dark'] html, :root[data-surface='dark'] body, :root[data-surface='dark'] #root { background: #000; color: #fff; }
      body { font-family: 'Urbanist', 'Inter', sans-serif; }
      @media print { .print\:hidden { display: none !important; } }
    </style>
  </head>
  <body>
    <div id="root" class="crm"></div>
    <script type="module" src="/src/crm/main-report.tsx"></script>
  </body>
</html>
